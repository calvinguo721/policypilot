name: Deploy Changes
on:
  workflow_dispatch:
    inputs:
      script_name:
        description: 'Script name in scripts/ folder'
        required: true
        default: 'fix_v3.py'
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Copy files and execute
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: 121.43.67.216
        username: root
        password: 136204Aoc
        command_timeout: 120s
        script_stop: true
        script: |
          mkdir -p /tmp/deploy
    - name: Copy script files
      uses: appleboy/scp-action@v0.1.7
      with:
        host: 121.43.67.216
        username: root
        password: 136204Aoc
        source: "scripts/*,frontend/*"
        target: "/tmp/deploy"
    - name: Execute
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: 121.43.67.216
        username: root
        password: 136204Aoc
        command_timeout: 120s
        script_stop: true
        script: |
          ls /tmp/deploy/
          if [ -f /tmp/deploy/scripts/${{ github.event.inputs.script_name }} ]; then
            python3 /tmp/deploy/scripts/${{ github.event.inputs.script_name }}
          fi
          if [ -f /tmp/deploy/scripts/ai-chat.html ]; then
            cp /tmp/deploy/scripts/ai-chat.html /var/www/policypilot/frontend/ai-chat.html
            echo "ai-chat.html deployed"
          fi
          if [ -f /tmp/deploy/frontend/ai-chat.html ]; then
            cp /tmp/deploy/frontend/ai-chat.html /var/www/policypilot/frontend/ai-chat.html
            echo "ai-chat.html deployed from frontend dir"
          fi
          echo "DONE"

name: Deploy Changes
on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Script URL or inline command'
        required: true
        default: 'echo hello'
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Copy and execute script
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: 121.43.67.216
        username: root
        password: 136204Aoc
        command_timeout: 120s
        script_stop: true
        script: |
          cat > /tmp/fix.py << 'SCRIPT_EOF'
          ${{ github.event.inputs.script }}
          SCRIPT_EOF
          python3 /tmp/fix.py

name: Fix All Frontend Features
on: workflow_dispatch
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
    - name: SSH and fix all
      uses: appleboy/ssh-action@v1
      with:
        host: 121.43.67.216
        username: root
        password: 136204Aoc
        script_timeout: 120s
        script: |
          # 1. 修复console.html - 添加getBalance/getUsage/getBill函数
          cd /var/www/policypilot/frontend
          
          # 在loadUserData函数之前添加API调用函数
          sed -i '/async function loadUserData/i\
    async function getBalance(apiKey) {\
      try {\
        const r = await fetch("/api/token/balance", { headers: { "X-API-Key": apiKey } });\
        return await r.json();\
      } catch(e) { return { success: false }; }\
    }\
\
    async function getUsage(apiKey) {\
      try {\
        const r = await fetch("/api/token/usage", { headers: { "X-API-Key": apiKey } });\
        const d = await r.json();\
        if (d.success) {\
          const summary = d.summary || {};\
          return {\
            success: true,\
            total_calls: summary.total_requests || 0,\
            basic_calls: (d.details || []).filter(x => x.operation_type === "basic_query").reduce((s,x) => s + x.request_count, 0),\
            advanced_calls: (d.details || []).filter(x => x.operation_type === "advanced_query").reduce((s,x) => s + x.request_count, 0),\
            daily_usage: (d.details || []).slice(-7).map(x => x.request_count || 0)\
          };\
        }\
        return { success: false };\
      } catch(e) { return { success: false }; }\
    }\
\
    async function getBill(apiKey) {\
      try {\
        const r = await fetch("/api/token/bill", { headers: { "X-API-Key": apiKey } });\
        return await r.json();\
      } catch(e) { return { success: false, bills: [] }; }\
    }\
' console.html

          # 2. 在console.html的充值区域旁加包月标识
          sed -i 's/充值余额/包月899元\/年 · 余额查询/' console.html

          # 3. 修复ai-chat.html - 添加预设问题和清空对话
          # 在输入框区域添加预设问题按钮
          sed -i 's|<div class="chat-input-container">|<div class="quick-questions" style="display:flex;gap:8px;padding:0 20px 12px;flex-wrap:wrap;"><button onclick="handleQuickQuestion(this)" class="quick-q" style="padding:8px 16px;border-radius:20px;border:1px solid rgba(0,212,255,0.3);background:rgba(0,212,255,0.08);color:#00d4ff;cursor:pointer;font-size:13px;transition:all .2s;">我司能拿哪些补贴？</button><button onclick="handleQuickQuestion(this)" class="quick-q" style="padding:8px 16px;border-radius:20px;border:1px solid rgba(0,212,255,0.3);background:rgba(0,212,255,0.08);color:#00d4ff;cursor:pointer;font-size:13px;transition:all .2s;">深圳科技企业有什么政策？</button><button onclick="handleQuickQuestion(this)" class="quick-q" style="padding:8px 16px;border-radius:20px;border:1px solid rgba(0,212,255,0.3);background:rgba(0,212,255,0.08);color:#00d4ff;cursor:pointer;font-size:13px;transition:all .2s;">创业补贴怎么申请？</button></div><div class="chat-input-container">|' ai-chat.html

          # 添加handleQuickQuestion和clearChat函数
          sed -i '/function sendMessage/i\
    function handleQuickQuestion(btn) {\
      const query = btn.textContent;\
      document.getElementById("chatInput").value = query;\
      sendMessage();\
    }\
\
    function clearChat() {\
      if (confirm("清空所有对话记录？")) {\
        document.getElementById("chatMessages").innerHTML = "";\
        localStorage.removeItem("chatHistory");\
        addWelcomeMessage();\
      }\
    }\
' ai-chat.html

          # 4. 添加清空按钮到header
          sed -i 's|PolicyPilot AI 助手|<span onclick="clearChat()" style="cursor:pointer;float:right;font-size:12px;color:#8899aa;padding:4px 12px;border:1px solid rgba(255,255,255,0.1);border-radius:6px;">清空对话</span> PolicyPilot AI 助手|' ai-chat.html

          # 5. 修复api-docs.html - 添加认证说明
          sed -i 's|<p class="docs-desc">采用包月订阅模式|<div style="background:rgba(245,166,35,0.08);border:1px solid rgba(245,166,35,0.2);border-radius:12px;padding:20px;margin-bottom:24px;"><h3 style="color:#f5a623;margin-bottom:12px;">认证方式</h3><p style="color:#8899aa;line-height:1.8;">所有API请求需在HTTP Header中携带 <code style="background:rgba(0,0,0,0.3);padding:2px 8px;border-radius:4px;color:#00d4ff;">X-API-Key</code> 参数进行身份验证。注册后即可获得API Key，每个Key关联一个企业账户。</p></div><p class="docs-desc">采用包月订阅模式|' api-docs.html

          # 6. 清缓存重启
          rm -rf /var/www/policypilot/engine/__pycache__
          systemctl restart policypilot
          echo ALL DONE

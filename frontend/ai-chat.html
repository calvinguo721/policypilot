<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="政策通AI补贴计算器 - 输入企业情况，秒算可拿补贴金额">
    <title>AI补贴计算器 - 政策通</title>
    <style>
        :root {
            --primary: #38bdf8;
            --primary-dark: #0ea5e9;
            --gold: #fbbf24;
            --gold-dark: #f59e0b;
            --success: #34d399;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-700: #475569;
            --gray-900: #0f172a;
            --error: #f87171;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --radius-full: 9999px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .chat-header {
            background: rgba(15, 23, 42, 0.95);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
        }
        .chat-header-content {
            max-width: 1000px;
            margin: 0 auto;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            border-radius: var(--radius-md);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 700; color: #0f172a;
        }
        .logo-text { font-size: 18px; font-weight: 700; color: #f1f5f9; }
        .chat-header-title { display: flex; align-items: center; gap: 12px; font-size: 16px; font-weight: 600; color: #f1f5f9; }
        .chat-header-badge {
            background: rgba(251, 191, 36, 0.2);
            color: var(--gold);
            padding: 4px 12px;
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 500;
        }

        /* Main Chat Area */
        .chat-main {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }

        /* Welcome Message */
        .welcome-section {
            text-align: center;
            padding: 40px 20px;
        }
        .welcome-icon { font-size: 64px; margin-bottom: 20px; }
        .welcome-title { font-size: 24px; font-weight: 700; color: #f1f5f9; margin-bottom: 12px; }
        .welcome-desc { font-size: 15px; color: #94a3b8; line-height: 1.7; max-width: 500px; margin: 0 auto 32px; }
        .welcome-tips { font-size: 14px; color: #64748b; margin-bottom: 24px; }

        /* Suggestion Chips */
        .suggestion-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 32px;
        }
        .suggestion-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: var(--radius-full);
            color: #e2e8f0;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .suggestion-chip:hover {
            background: rgba(251, 191, 36, 0.15);
            border-color: rgba(251, 191, 36, 0.4);
            color: var(--gold);
            transform: translateY(-2px);
        }

        /* Messages */
        .message { display: flex; gap: 12px; margin-bottom: 20px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { flex-direction: row-reverse; }
        .message-avatar { width: 36px; height: 36px; background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
        .message.user .message-avatar { background: rgba(56, 189, 248, 0.3); }
        .message-content { max-width: 75%; padding: 14px 18px; border-radius: var(--radius-lg); line-height: 1.7; font-size: 15px; }
        .message.ai .message-content { background: rgba(30, 41, 59, 0.9); border: 1px solid rgba(255,255,255,0.1); color: #e2e8f0; }
        .message.user .message-content { background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%); color: #0f172a; }
        .message-time { font-size: 11px; color: #64748b; margin-top: 8px; text-align: right; }
        .message.user .message-time { color: rgba(255,255,255,0.6); }

        /* Policy Evidence Badge */
        .policy-evidence {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(52, 211, 153, 0.15);
            border: 1px solid rgba(52, 211, 153, 0.3);
            color: var(--success);
            padding: 6px 12px;
            border-radius: var(--radius-full);
            font-size: 12px;
            margin-top: 12px;
        }

        /* Loading Indicator */
        .loading-indicator { display: flex; align-items: center; gap: 12px; padding: 14px 18px; background: rgba(30, 41, 59, 0.9); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-lg); margin-bottom: 20px; }
        .loading-indicator.hidden { display: none; }
        .loading-dots { display: flex; gap: 4px; }
        .loading-dots span { width: 8px; height: 8px; background: var(--gold); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        .loading-text { color: #94a3b8; font-size: 14px; }

        /* Input Area */
        .chat-input-area {
            background: rgba(30, 41, 59, 0.95);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 16px 20px;
            flex-shrink: 0;
        }
        .chat-input-container { max-width: 900px; margin: 0 auto; display: flex; gap: 12px; align-items: flex-end; }
        .chat-input {
            flex: 1;
            padding: 14px 18px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: var(--radius-lg);
            color: #f1f5f9;
            font-size: 15px;
            resize: none;
            max-height: 150px;
            font-family: inherit;
            transition: all 0.2s;
        }
        .chat-input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.2); }
        .chat-input::placeholder { color: #64748b; }
        .send-btn { width: 48px; height: 48px; background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%); border: none; border-radius: var(--radius-lg); color: #0f172a; font-size: 20px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 12px rgba(251, 191, 36, 0.4); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Footer Status */
        .chat-footer {
            background: rgba(15, 23, 42, 0.9);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 12px 20px;
            text-align: center;
            flex-shrink: 0;
        }
        .chat-footer-text { font-size: 12px; color: #64748b; }
        .remaining-count { color: var(--gold); font-weight: 600; }

        /* Error Message */
        .error-message { background: rgba(248, 113, 113, 0.15); border: 1px solid rgba(248, 113, 113, 0.3); border-radius: var(--radius-md); padding: 12px 16px; margin: 8px 16px; display: flex; align-items: center; gap: 10px; font-size: 14px; color: #f87171; }
        .error-message.hidden { display: none; }
        .error-message.warning { background: rgba(251, 191, 36, 0.15); border-color: rgba(251, 191, 36, 0.3); color: #fbbf24; }

        /* Highlight amounts in gold */
        .amount-highlight { color: var(--gold); font-weight: 700; font-size: 1.1em; }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .chat-header-content { flex-direction: column; gap: 12px; }
            .message-content { max-width: 85%; }
            .suggestion-chips { gap: 8px; }
            .suggestion-chip { padding: 8px 14px; font-size: 13px; }
            .chat-input-container { flex-direction: column; }
            .send-btn { width: 100%; height: 48px; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="chat-header">
        <div class="chat-header-content">
            <a href="/" class="logo">
                <div class="logo-icon">政</div>
                <div class="logo-text">政策通</div>
            </a>
            <div class="chat-header-title">
                🤖 AI补贴计算器
                <span class="chat-header-badge">智能匹配</span>
            </div>
        </div>
    </header>

    <!-- Main Chat Area -->
    <main class="chat-main" id="chatMain">
        <!-- Welcome Section (shown initially) -->
        <div class="welcome-section" id="welcomeSection">
            <div class="welcome-icon">🎯</div>
            <h1 class="welcome-title">你的企业，能拿多少补贴？</h1>
            <p class="welcome-desc">
                👋 你好！我是政策通AI助手，帮你算算企业能拿多少补贴。<br><br>
                告诉我你的企业情况，我马上给你匹配：
            </p>
            <p class="welcome-tips">💡 点击下方快速开始，或直接输入你的情况</p>
            
            <div class="suggestion-chips">
                <button class="suggestion-chip" onclick="startChat(this.textContent)">🏢 海珠区AI创业公司</button>
                <button class="suggestion-chip" onclick="startChat(this.textContent)">💻 天河区软件企业</button>
                <button class="suggestion-chip" onclick="startChat(this.textContent)">🔬 专精特新企业申报</button>
                <button class="suggestion-chip" onclick="startChat(this.textContent)">🏭 小微企业租金减免</button>
                <button class="suggestion-chip" onclick="startChat(this.textContent)">🧠 大模型产业扶持</button>
                <button class="suggestion-chip" onclick="startChat(this.textContent)">🏗️ 新认定高新技术企业</button>
            </div>
        </div>

        <!-- Messages Container -->
        <div id="chatMessages"></div>

        <!-- Loading Indicator -->
        <div id="loadingIndicator" class="loading-indicator hidden">
            <div class="loading-dots"><span></span><span></span><span></span></div>
            <span class="loading-text">正在分析您的情况...</span>
        </div>

        <!-- Global Error -->
        <div id="globalError" class="error-message hidden"></div>
    </main>

    <!-- Input Area -->
    <div class="chat-input-area">
        <div class="chat-input-container">
            <textarea 
                id="chatInput" 
                class="chat-input" 
                placeholder="描述你的企业情况，比如：我是海珠区的AI创业公司，10人团队"
                rows="1"
            ></textarea>
            <button id="sendBtn" class="send-btn">➤</button>
        </div>
    </div>

    <!-- Footer -->
    <footer class="chat-footer">
        <div class="chat-footer-text">
            政策通AI助手 · <span class="remaining-count" id="remainingCount">今日剩余 999 次查询</span>
        </div>
    </footer>

    <script>
        // API Configuration
        var API_BASE = window.location.origin;
        var remainingToday = 999;
        var isLoading = false;
        var hasStarted = false;

        // DOM Elements
        var chatMain = document.getElementById('chatMain');
        var chatMessages = document.getElementById('chatMessages');
        var chatInput = document.getElementById('chatInput');
        var sendBtn = document.getElementById('sendBtn');
        var loadingIndicator = document.getElementById('loadingIndicator');
        var welcomeSection = document.getElementById('welcomeSection');
        var globalError = document.getElementById('globalError');
        var remainingCount = document.getElementById('remainingCount');

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            // Check for URL query parameter
            var urlParams = new URLSearchParams(window.location.search);
            var queryParam = urlParams.get('q');
            if (queryParam) {
                startChat(queryParam);
            }

            // Auto-resize textarea
            chatInput.addEventListener('input', autoResize);
            chatInput.addEventListener('paste', function() { setTimeout(autoResize, 0); });

            // Send button click
            sendBtn.addEventListener('click', sendMessage);

            // Enter to send
            chatInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            chatInput.focus();
        });

        // Auto resize textarea
        function autoResize() {
            chatInput.style.height = 'auto';
            chatInput.style.height = Math.min(chatInput.scrollHeight, 150) + 'px';
        }

        // Start chat with a prompt
        function startChat(prompt) {
            if (!hasStarted) {
                hasStarted = true;
                welcomeSection.style.display = 'none';
            }
            chatInput.value = prompt.replace(/^[^\s]+\s/, '');
            sendMessage();
        }

        // Send message
        async function sendMessage() {
            var message = chatInput.value.trim();
            if (!message || isLoading) return;

            // Clear input
            chatInput.value = '';
            autoResize();

            // Hide welcome if first message
            if (!hasStarted) {
                hasStarted = true;
                welcomeSection.style.display = 'none';
            }

            // Add user message
            addMessage('user', message);

            // Show loading
            showLoading();

            try {
                var response = await fetch(API_BASE + '/api/partner/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query: message,
                        company_info: { partner_id: 'web_guest' }
                    })
                });

                if (!response.ok) {
                    throw new Error('请求失败');
                }

                var data = await response.json();

                // Update remaining count
                if (data.metadata && data.metadata.remaining_today) {
                    remainingToday = data.metadata.remaining_today;
                    updateRemainingCount();
                }

                // Add AI response
                addMessage('ai', data.response, data.metadata);

            } catch (error) {
                console.error('Error:', error);
                showError('抱歉，服务暂时不可用，请稍后重试。');
            } finally {
                hideLoading();
            }
        }

        // Add message to chat
        function addMessage(role, content, metadata) {
            var messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + (role === 'user' ? 'user' : 'ai');

            var html = '';
            if (role === 'ai') {
                html = '<div class="message-avatar">🤖</div>';
                html += '<div class="message-content">';
                html += '<div class="message-text">' + formatContent(content) + '</div>';
                
                // Add policy evidence badge
                if (metadata && metadata.policies_found > 0) {
                    html += '<div class="policy-evidence">✅ 基于' + metadata.policies_found + '条真实政策数据回答</div>';
                }
                
                html += '<div class="message-time">' + formatTime() + '</div>';
                html += '</div>';
            } else {
                html = '<div class="message-content">';
                html += '<div class="message-text">' + escapeHtml(content) + '</div>';
                html += '<div class="message-time">' + formatTime() + '</div>';
                html += '</div>';
                html += '<div class="message-avatar">👤</div>';
            }

            messageDiv.innerHTML = html;
            chatMessages.appendChild(messageDiv);
            scrollToBottom();
        }

        // Format AI content (basic markdown + highlight amounts)
        function formatContent(text) {
            if (!text) return '';
            var formatted = escapeHtml(text);
            // Bold
            formatted = formatted.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            // Highlight amounts (numbers with 万, 亿, 元, etc.)
            formatted = formatted.replace(/(¥?\d+(?:\.\d+)?(?:万|亿|元|千))/g, '<span class="amount-highlight">$1</span>');
            // Line breaks
            formatted = formatted.replace(/\n/g, '<br>');
            return formatted;
        }

        // Escape HTML
        function escapeHtml(text) {
            if (!text) return '';
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Format time
        function formatTime() {
            var now = new Date();
            return now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        // Update remaining count
        function updateRemainingCount() {
            remainingCount.textContent = '今日剩余 ' + remainingToday + ' 次查询';
        }

        // Show/hide loading
        function showLoading() {
            isLoading = true;
            sendBtn.disabled = true;
            loadingIndicator.classList.remove('hidden');
        }

        function hideLoading() {
            isLoading = false;
            sendBtn.disabled = false;
            loadingIndicator.classList.add('hidden');
            chatInput.focus();
        }

        // Show error
        function showError(message) {
            globalError.textContent = message;
            globalError.classList.remove('hidden');
            setTimeout(function() {
                globalError.classList.add('hidden');
            }, 5000);
        }

        // Scroll to bottom
        function scrollToBottom() {
            setTimeout(function() {
                chatMain.scrollTop = chatMain.scrollHeight;
            }, 100);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="政策通 AI助手 - 免费政策匹配体验">
    <title>政策通 AI助手 — 免费试用</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/chat.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        .chat-header {
            background: rgba(15, 23, 42, 0.95);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo-text { color: #f1f5f9; }
        .logo-text span { color: #38bdf8; }
        .logo-icon { background: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 100%); }
        .chat-header-title { color: #f1f5f9; }
        .chat-header-badge {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }
        .chat-footer {
            background: rgba(15, 23, 42, 0.9);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .chat-footer-text { color: #64748b; }
        .chat-input-area {
            background: rgba(30, 41, 59, 0.95);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .chat-input {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255,255,255,0.15);
            color: #f1f5f9;
        }
        .chat-input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }
        .send-btn {
            background: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 100%);
            color: #0f172a;
        }
        .message-bot .message-content {
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid rgba(255,255,255,0.1);
            color: #e2e8f0;
        }
        .message-user .message-content {
            background: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 100%);
            color: #0f172a;
        }
        .loading-dots span {
            background: #38bdf8;
        }
        /* Token API 提示条 */
        .token-promo {
            background: linear-gradient(90deg, rgba(56, 189, 248, 0.1) 0%, rgba(16, 185, 129, 0.1) 100%);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: var(--radius-lg);
            padding: 16px 20px;
            margin: 0 16px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .token-promo-text {
            font-size: 13px;
            color: #94a3b8;
        }
        .token-promo-text strong {
            color: #38bdf8;
        }
        .token-promo-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 100%);
            color: #0f172a;
            border: none;
            border-radius: var(--radius-md);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .token-promo-btn:hover {
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.4);
        }
        
        /* 错误消息样式 */
        .error-message {
            background: rgba(248, 113, 113, 0.15);
            border: 1px solid rgba(248, 113, 113, 0.3);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            margin: 8px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #f87171;
        }
        .error-message.hidden { display: none; }
        .error-message.warning {
            background: rgba(251, 191, 36, 0.15);
            border-color: rgba(251, 191, 36, 0.3);
            color: #fbbf24;
        }
        .error-message.info {
            background: rgba(56, 189, 248, 0.15);
            border-color: rgba(56, 189, 248, 0.3);
            color: #38bdf8;
        }
        .error-actions {
            margin-left: auto;
            display: flex;
            gap: 8px;
        }
        .error-btn {
            padding: 4px 12px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: var(--radius-sm);
            color: inherit;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .error-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        .error-btn.retry {
            background: rgba(56, 189, 248, 0.2);
            color: #38bdf8;
        }
        
        /* 网络状态指示器 */
        .network-status {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(248, 113, 113, 0.9);
            color: white;
            padding: 8px 20px;
            border-radius: var(--radius-full);
            font-size: 13px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: slideDown 0.3s;
        }
        .network-status.hidden { display: none; }
        .network-status.reconnecting {
            background: rgba(251, 191, 36, 0.9);
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        /* 重试按钮 */
        .retry-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: rgba(56, 189, 248, 0.2);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: var(--radius-md);
            color: #38bdf8;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
        }
        .retry-btn:hover {
            background: rgba(56, 189, 248, 0.3);
        }
        
        @media (max-width: 768px) {
            .token-promo {
                flex-direction: column;
                text-align: center;
            }
            .token-promo-btn {
                width: 100%;
            }
            .error-actions {
                flex-direction: column;
                margin-left: 0;
                margin-top: 8px;
                width: 100%;
            }
            .error-btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- 网络状态指示器 -->
    <div id="network-status" class="network-status hidden">
        <span>🌐</span>
        <span id="network-status-text">网络连接失败</span>
    </div>

    <div class="chat-page">
        <!-- 头部 -->
        <header class="chat-header">
            <div class="chat-header-content">
                <div class="chat-header-left">
                    <a href="/" class="logo">
                        <div class="logo-icon">政</div>
                        <div class="logo-text">政策通 <span>Token API</span></div>
                    </a>
                </div>
                <div class="chat-header-title">
                    🤖 AI助手 — 免费试用
                    <span class="chat-header-badge">政策匹配</span>
                </div>
            </div>
        </header>

        <!-- 主内容 -->
        <main class="chat-main">
            <!-- Token API 提示 -->
            <div class="token-promo">
                <div class="token-promo-text">
                    企业用户推荐使用 <strong>Token API</strong>，包月899元/年，5分钟接入
                </div>
                <a href="/api-docs" class="token-promo-btn">查看 API 文档 →</a>
            </div>
            
            <!-- 全局错误提示 -->
            <div id="global-error" class="error-message hidden"></div>
            
            <!-- 对话区域 -->
            <div class="chat-messages" id="chatMessages">
                <!-- 消息将动态插入 -->
            </div>

            <!-- 加载指示器 -->
            <div id="loadingIndicator" class="loading-indicator hidden">
                <div class="loading-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <span>正在分析您的情况...</span>
            </div>
        </main>

        <!-- 输入区域 -->
        <div class="chat-input-area">
            <div class="chat-input-container">
                <textarea 
                    id="chatInput" 
                    class="chat-input" 
                    placeholder="用自然语言描述您的情况，比如：我是海珠区的AI创业公司"
                    rows="1"
                ></textarea>
                <button id="sendBtn" class="send-btn">➤</button>
            </div>
        </div>

        <!-- Footer -->
        <footer class="chat-footer">
            <div class="chat-footer-text">
                开源大叔 · 政策通 Token API · 启觉科技
            </div>
        </footer>
    </div>

    <!-- 材料生成弹窗 -->
    <div id="material-modal" class="modal modal-lg hidden">
        <div class="modal-overlay" onclick="closeMaterialModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>📄 生成申报材料</h3>
                <button class="modal-close" onclick="closeMaterialModal()">×</button>
            </div>
            <div class="modal-body" id="material-modal-body"></div>
        </div>
    </div>

    <!-- 预览弹窗 -->
    <div id="preview-modal" class="modal modal-xl hidden">
        <div class="modal-overlay" onclick="closePreviewModal()"></div>
        <div class="modal-content modal-preview">
            <div class="modal-header">
                <h3>📋 申报材料预览</h3>
                <button class="modal-close" onclick="closePreviewModal()">×</button>
            </div>
            <div class="modal-body">
                <iframe id="preview-frame" class="preview-frame"></iframe>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closePreviewModal()">关闭</button>
                <button class="btn btn-primary" onclick="downloadMaterial()">
                    <span>💾</span>
                    <span>下载完整材料包</span>
                </button>
            </div>
        </div>
    </div>

    <script src="/static/js/chat.js"></script>
    <script>
        // 网络状态监控
        let isOnline = navigator.onLine;
        let retryCount = 0;
        const MAX_RETRY = 3;
        
        function updateNetworkStatus(status, message) {
            const el = document.getElementById('network-status');
            const textEl = document.getElementById('network-status-text');
            el.classList.remove('hidden', 'reconnecting');
            if (status === 'reconnecting') {
                el.classList.add('reconnecting');
            }
            textEl.textContent = message;
        }
        
        function hideNetworkStatus() {
            document.getElementById('network-status').classList.add('hidden');
        }
        
        window.addEventListener('online', () => {
            isOnline = true;
            hideNetworkStatus();
            showGlobalError('🌐 网络已恢复', 'info');
            setTimeout(() => hideGlobalError(), 3000);
        });
        
        window.addEventListener('offline', () => {
            isOnline = false;
            updateNetworkStatus('offline', '网络连接已断开');
        });
        
        // 全局错误提示
        function showGlobalError(message, type = 'error') {
            const el = document.getElementById('global-error');
            el.innerHTML = message;
            el.className = 'error-message ' + type;
            el.classList.remove('hidden');
        }
        
        function hideGlobalError() {
            document.getElementById('global-error').classList.add('hidden');
        }
        
        // 带重试的 fetch
        async function fetchWithRetry(url, options, retries = MAX_RETRY) {
            for (let i = 0; i <= retries; i++) {
                try {
                    if (!navigator.onLine) {
                        throw new Error('NETWORK_OFFLINE');
                    }
                    
                    const response = await fetch(url, {
                        ...options,
                        signal: AbortSignal.timeout(15000) // 15秒超时
                    });
                    
                    return response;
                } catch (error) {
                    if (error.name === 'AbortError') {
                        if (i === retries) throw new Error('请求超时，请稍后重试');
                        updateNetworkStatus('reconnecting', `请求超时，正在重试 (${i + 1}/${retries})...`);
                    } else if (error.message === 'NETWORK_OFFLINE') {
                        updateNetworkStatus('offline', '网络连接已断开');
                        throw error;
                    } else {
                        if (i === retries) {
                            updateNetworkStatus('failed', '请求失败');
                            throw error;
                        }
                        updateNetworkStatus('reconnecting', `连接失败，正在重试 (${i + 1}/${retries})...`);
                    }
                    
                    if (i < retries) {
                        await new Promise(resolve => setTimeout(resolve, 1000 * (i + 1))); // 指数退避
                    }
                }
            }
        }
        
        // 覆写 sendMessage 函数以添加错误处理
        const originalSendMessage = typeof sendMessage === 'function' ? sendMessage : null;
        
        // 如果 chat.js 中没有 sendMessage，在此处定义
        if (!originalSendMessage) {
            async function sendMessage(message) {
                if (!message.trim()) return;
                
                const messagesContainer = document.getElementById('chatMessages');
                const loadingIndicator = document.getElementById('loadingIndicator');
                
                // 添加用户消息
                addMessage('user', message);
                document.getElementById('chatInput').value = '';
                
                // 显示加载状态
                loadingIndicator.classList.remove('hidden');
                hideGlobalError();
                
                try {
                    const response = await fetchWithRetry('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: message })
                    });
                    
                    if (!response.ok) {
                        if (response.status === 401) {
                            showGlobalError('❌ 请先登录或注册账户 <a href="/console" style="color:#38bdf8;margin-left:8px;">去登录</a>');
                        } else if (response.status === 402) {
                            showGlobalError('💰 余额不足，请充值后继续使用 <a href="/console" style="color:#38bdf8;margin-left:8px;">立即充值</a>');
                        } else if (response.status === 429) {
                            showGlobalError('⏱️ 请求过于频繁，请稍后再试');
                        } else {
                            showGlobalError('❌ 服务异常，请稍后重试 (' + response.status + ')');
                        }
                        loadingIndicator.classList.add('hidden');
                        return;
                    }
                    
                    const data = await response.json();
                    loadingIndicator.classList.add('hidden');
                    
                    if (data.error) {
                        showGlobalError('❌ ' + data.error);
                        return;
                    }
                    
                    // 添加 AI 回复
                    addMessage('bot', data.response || data.message || '感谢您的提问，请稍后查看政策匹配结果。');
                    
                    // 如果有政策结果，显示它们
                    if (data.policies && data.policies.length > 0) {
                        renderPolicies(data.policies);
                    }
                    
                } catch (error) {
                    loadingIndicator.classList.add('hidden');
                    
                    if (error.message === 'NETWORK_OFFLINE' || !navigator.onLine) {
                        showGlobalError('🌐 网络连接已断开，请检查网络后重试', 'warning');
                    } else if (error.message.includes('超时')) {
                        showGlobalError('⏱️ 请求超时，请稍后重试', 'warning');
                    } else {
                        showGlobalError('❌ 服务暂时不可用，请稍后重试', 'warning');
                    }
                    
                    // 添加重试按钮
                    addRetryButton(message);
                }
            }
        }
        
        // 添加重试按钮
        function addRetryButton(originalMessage) {
            const messagesContainer = document.getElementById('chatMessages');
            const retryDiv = document.createElement('div');
            retryDiv.className = 'message message-bot';
            retryDiv.innerHTML = `
                <div class="message-content">
                    <p style="color: #94a3b8;">😔 抱歉，刚才的请求失败了</p>
                    <button class="retry-btn" onclick="retryMessage('${originalMessage.replace(/'/g, "\\'")}')">
                        🔄 重试
                    </button>
                </div>
            `;
            messagesContainer.appendChild(retryDiv);
            scrollToBottom();
        }
        
        // 重试消息
        function retryMessage(message) {
            // 移除最后一条错误消息
            const messages = document.getElementById('chatMessages');
            if (messages.lastChild && messages.lastChild.querySelector('.retry-btn')) {
                messages.removeChild(messages.lastChild);
            }
            // 重新发送
            sendMessage(message);
        }
        
        // 滚动到底部
        function scrollToBottom() {
            const container = document.getElementById('chatMessages');
            container.scrollTop = container.scrollHeight;
        }
        
        // 添加消息
        function addMessage(type, content) {
            const messagesContainer = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message message-' + (type === 'user' ? 'user' : 'bot');
            
            if (type === 'bot') {
                // 支持 HTML 内容
                messageDiv.innerHTML = '<div class="message-content">' + content + '</div>';
            } else {
                messageDiv.innerHTML = '<div class="message-content"><p>' + content + '</p></div>';
            }
            
            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
        }
        
        // 渲染政策列表
        function renderPolicies(policies) {
            const messagesContainer = document.getElementById('chatMessages');
            const policiesDiv = document.createElement('div');
            policiesDiv.className = 'message message-bot';
            
            let html = '<div class="message-content"><p style="margin-bottom:12px;">📋 为您找到以下匹配的政策：</p><div class="policy-list">';
            
            policies.slice(0, 5).forEach(policy => {
                html += `
                    <div class="policy-item" style="background:rgba(15,23,42,0.5);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:12px;margin-bottom:8px;">
                        <div style="font-weight:600;color:#f1f5f9;margin-bottom:4px;">${policy.name || '政策标题'}</div>
                        <div style="font-size:12px;color:#94a3b8;">${policy.district || ''} | ${policy.amount || '金额面议'}</div>
                    </div>
                `;
            });
            
            html += '</div></div>';
            policiesDiv.innerHTML = html;
            messagesContainer.appendChild(policiesDiv);
            scrollToBottom();
        }
        
        // 发送按钮点击
        document.getElementById('sendBtn').addEventListener('click', () => {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (message && typeof sendMessage === 'function') {
                sendMessage(message);
            }
        });
        
        // 回车发送
        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const input = document.getElementById('chatInput');
                const message = input.value.trim();
                if (message && typeof sendMessage === 'function') {
                    sendMessage(message);
                }
            }
        });
        
        // 初始化：添加欢迎消息
        document.addEventListener('DOMContentLoaded', () => {
            const messagesContainer = document.getElementById('chatMessages');
            if (messagesContainer.children.length === 0) {
                addMessage('bot', `
                    <p>👋 您好！我是政策通 AI 助手</p>
                    <p style="margin-top:12px;">请用自然语言描述您的情况，比如：</p>
                    <ul style="margin-top:8px;padding-left:20px;color:#94a3b8;">
                        <li>"我是海珠区的AI创业公司"</li>
                        <li>"我们在天河区，有20名员工"</li>
                        <li>"软件企业，2023年成立的"</li>
                    </ul>
                    <p style="margin-top:12px;color:#64748b;font-size:13px;">
                        💡 我会根据您的情况，智能匹配最适合的政策！
                    </p>
                `);
            }
        });
    </script>
    <script>
        // 复用主页面的材料生成逻辑
        let selectedPolicyForMaterial = null;
        let generatedMaterial = null;

        function showMaterialModal(policyId) {
            document.getElementById('material-modal').classList.remove('hidden');
            document.getElementById('material-modal-body').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <div class="loading-text">正在准备申报材料...</div>
                </div>
            `;
            
            fetch(`/policy/${policyId}`)
                .then(r => r.json())
                .then(policy => {
                    selectedPolicyForMaterial = policy;
                    document.getElementById('material-modal-body').innerHTML = `
                        <div class="form-group">
                            <label class="form-label">企业名称 <span class="required">*</span></label>
                            <input type="text" id="material-company" class="form-input" 
                                   placeholder="请输入企业全称">
                        </div>
                        <div class="form-group">
                            <label class="form-label">政策名称</label>
                            <input type="text" class="form-input" value="${policy.name}" readonly>
                        </div>
                        <div class="btn-group" style="margin-top: 20px;">
                            <button class="btn btn-secondary" onclick="closeMaterialModal()">取消</button>
                            <button class="btn btn-primary" onclick="generateMaterialForPolicy()">
                                <span>生成申报材料</span>
                            </button>
                        </div>
                    `;
                })
                .catch(err => {
                    document.getElementById('material-modal-body').innerHTML = `
                        <p style="color: var(--error);">加载政策信息失败</p>
                        <p style="color:#94a3b8;font-size:13px;margin-top:8px;">请检查网络连接后重试</p>
                        <button class="btn btn-secondary" onclick="closeMaterialModal()" style="margin-top:16px;">关闭</button>
                    `;
                });
        }

        function closeMaterialModal() {
            document.getElementById('material-modal').classList.add('hidden');
        }

        function generateMaterialForPolicy() {
            const companyName = document.getElementById('material-company').value.trim();
            if (!companyName) {
                alert('请输入企业名称');
                return;
            }
            
            const modalBody = document.getElementById('material-modal-body');
            modalBody.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <div class="loading-text">正在为您生成申报材料...</div>
                </div>
            `;
            
            const policy = selectedPolicyForMaterial;
            
            const requestData = {
                policy_id: policy.id,
                company_name: companyName,
                district: policy.district || '海珠区',
                industry: policy.conditions?.industry?.[0] || '软件和信息技术服务业',
                established_years: 1,
                employee_count: 10,
                revenue_scale: '小于500万',
                has_ip: false,
                is_high_tech: false,
                is_specialized: false,
                has_vc_investment: false
            };
            
            fetch('/generate-materials', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestData)
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    generatedMaterial = data;
                    modalBody.innerHTML = `
                        <div style="background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);border-radius:8px;padding:16px;margin-bottom:16px;">
                            <div style="font-size:18px;margin-bottom:8px;">✅</div>
                            <div style="font-weight:600;color:#34d399;">材料生成成功！</div>
                            <div style="font-size:13px;color:#94a3b8;margin-top:4px;">以下是为您生成的申报材料预览</div>
                        </div>
                        <div style="background:var(--gray-50);padding:16px;border-radius:var(--radius-md);max-height:400px;overflow-y:auto;color:#374151;">
                            ${data.content || '暂无预览内容'}
                        </div>
                        <div class="btn-group" style="margin-top: 20px; justify-content: center;">
                            <button class="btn btn-secondary" onclick="closeMaterialModal()">关闭</button>
                            <button class="btn btn-primary" onclick="downloadMaterial()">
                                💾 下载完整材料包
                            </button>
                        </div>
                    `;
                } else {
                    modalBody.innerHTML = `
                        <div style="background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);border-radius:8px;padding:16px;margin-bottom:16px;">
                            <div style="font-size:18px;margin-bottom:8px;">❌</div>
                            <div style="font-weight:600;color:#f87171;">生成失败</div>
                            <div style="font-size:13px;color:#94a3b8;margin-top:4px;">${data.error || '未知错误'}</div>
                        </div>
                        <button class="btn btn-secondary" onclick="closeMaterialModal()" style="width:100%;">关闭</button>
                    `;
                }
            })
            .catch(err => {
                modalBody.innerHTML = `
                    <div style="background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);border-radius:8px;padding:16px;">
                        <div style="font-size:18px;margin-bottom:8px;">🌐</div>
                        <div style="font-weight:600;color:#f87171;">网络错误</div>
                        <div style="font-size:13px;color:#94a3b8;margin-top:4px;">请检查网络连接后重试</div>
                    </div>
                    <button class="btn btn-secondary" onclick="generateMaterialForPolicy()" style="margin-top:16px;width:100%;">🔄 重试</button>
                `;
            });
        }

        function downloadMaterial() {
            if (generatedMaterial) {
                alert('完整材料包下载功能即将上线，当前可复制预览内容使用。');
            }
        }

        function closePreviewModal() {
            document.getElementById('preview-modal').classList.add('hidden');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI对话 - 政策通 PolicyPilot</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e1a;--dark:#141929;--cyan:#00d4ff;--gold:#f5a623;--white:#f0f0f0;--gray:#8899aa;--border:rgba(255,255,255,0.06)}
body{background:var(--bg);color:var(--white);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;height:100vh;display:flex;flex-direction:column}
.nav{padding:14px 24px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,14,26,0.9);border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-size:17px;font-weight:700;color:var(--white);text-decoration:none}.logo span{color:var(--gold)}
.nav-right{display:flex;gap:10px;align-items:center}
.nb{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;text-decoration:none}
.nb-g{background:transparent;color:var(--gray);border:1px solid rgba(255,255,255,0.1)}
.nb-g:hover{color:var(--white)}
.nb-y{background:var(--gold);color:#000}
.cw{flex:1;overflow-y:auto;padding:20px;max-width:800px;width:100%;margin:0 auto}
.wl{text-align:center;padding:60px 20px}
.wl h2{font-size:1.6rem;margin-bottom:12px}
.wl p{color:var(--gray);font-size:14px;margin-bottom:24px}
.qb{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.qbtn{padding:10px 20px;border-radius:20px;border:1px solid rgba(0,212,255,0.3);background:rgba(0,212,255,0.06);color:var(--cyan);cursor:pointer;font-size:13px}
.qbtn:hover{background:rgba(0,212,255,0.12)}
.m{display:flex;gap:12px;margin-bottom:16px;animation:fi .3s}
.m.u{flex-direction:row-reverse}
.ma{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;font-weight:700}
.m.u .ma{background:rgba(0,212,255,0.15);color:var(--cyan)}
.m.a .ma{background:rgba(245,166,35,0.15);color:var(--gold)}
.mb{max-width:75%;padding:14px 18px;border-radius:14px;font-size:14px;line-height:1.7;word-break:break-word}
.m.u .mb{background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.15)}
.m.a .mb{background:var(--dark);border:1px solid var(--border)}
.mb p{margin:0}.mb p+p{margin-top:8px}
.mb a{color:var(--cyan)}
.ty{display:flex;gap:4px;padding:14px 18px}
.ty span{width:6px;height:6px;background:var(--gray);border-radius:50%;animation:bo 1.2s infinite}
.ty span:nth-child(2){animation-delay:.2s}
.ty span:nth-child(3){animation-delay:.4s}
.ln{text-align:center;padding:16px;background:rgba(245,166,35,0.06);border:1px solid rgba(245,166,35,0.15);border-radius:12px;margin:12px 0;font-size:13px;color:var(--gold)}
.ln a{color:var(--cyan);text-decoration:underline}
.ib{padding:12px 20px 20px;max-width:800px;width:100%;margin:0 auto;flex-shrink:0}
.rm{font-size:11px;color:var(--gray);text-align:right;margin-bottom:6px}
.ir{display:flex;gap:10px;background:var(--dark);border:1px solid var(--border);border-radius:14px;padding:6px 6px 6px 16px;transition:border-color .2s}
.ir:focus-within{border-color:var(--gold)}
.ir textarea{flex:1;background:none;border:none;outline:none;color:var(--white);font-size:14px;resize:none;max-height:120px;line-height:1.5;padding:8px 0;font-family:inherit}
.ir textarea::placeholder{color:#445}
.sb{padding:10px 24px;background:var(--gold);color:#000;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;align-self:flex-end}
.sb:disabled{opacity:.4;cursor:not-allowed}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes bo{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
</style>
</head>
<body>
<nav class="nav">
  <a href="/" class="logo">Policy<span>Pilot</span></a>
  <div class="nav-right">
    <a href="/console.html" class="nb nb-g">控制台</a>
    <a href="/subscribe.html" class="nb nb-y">899元/年</a>
  </div>
</nav>
<div class="cw" id="cw">
  <div class="wl" id="wl">
    <h2>政策补贴，一问便知</h2>
    <p>输入您想了解的政策、补贴或申报条件</p>
    <div class="qb">
      <button class="qbtn" onclick="ask(this)">我司能拿哪些补贴？</button>
      <button class="qbtn" onclick="ask(this)">深圳科技企业有什么政策？</button>
      <button class="qbtn" onclick="ask(this)">创业补贴怎么申请？</button>
    </div>
  </div>
  <div id="msgs"></div>
</div>
<div class="ib">
  <div class="rm" id="rm"></div>
  <div class="ir">
    <textarea id="inp" rows="1" placeholder="输入政策相关问题..."></textarea>
    <button class="sb" id="sbtn">发送</button>
  </div>
</div>
<script>
(function(){
var inp=document.getElementById('inp');
var sbtn=document.getElementById('sbtn');
var msgs=document.getElementById('msgs');
var wl=document.getElementById('wl');
var cw=document.getElementById('cw');
var rm=document.getElementById('rm');
var loading=false;

inp.addEventListener('input',function(){
  inp.style.height='auto';
  inp.style.height=Math.min(inp.scrollHeight,120)+'px';
});
inp.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}
});
sbtn.onclick=doSend;
window.ask=function(b){inp.value=b.textContent;doSend();};

var qp=new URLSearchParams(location.search).get('q');
if(qp){inp.value=qp;setTimeout(doSend,300);}

function doSend(){
  var text=inp.value.trim();
  if(!text||loading)return;
  loading=true;sbtn.disabled=true;
  wl.style.display='none';
  addMsg('u',text);
  inp.value='';inp.style.height='auto';

  var tEl=document.createElement('div');
  tEl.className='m a';
  tEl.innerHTML='<div class="ma">AI</div><div class="mb"><div class="ty"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(tEl);
  sb();

  fetch('/api/partner/chat',{
    method:'POST',
    headers:{'Content-Type':'application/json','X-Partner-ID':'web_guest'},
    body:JSON.stringify({query:text})
  }).then(function(r){return r.json();}).then(function(d){
    tEl.remove();
    var limited=d.metadata&&d.metadata.status==='rate_limited';
    if(d.response){
      if(limited){
        var n=document.createElement('div');
        n.className='ln';
        n.innerHTML=d.response+' <a href="/subscribe.html">立即开通</a>';
        msgs.appendChild(n);
      }else{
        addMsg('a',d.response);
      }
    }else{
      addMsg('a','服务暂时不可用，请稍后重试。');
    }
    if(d.metadata){
      var rem=d.metadata.remaining_today;
      var lim=d.metadata.daily_limit;
      if(rem!==undefined)rm.textContent='今日剩余 '+rem+'/'+lim+' 次';
    }
    loading=false;sbtn.disabled=false;sb();
  }).catch(function(e){
    tEl.remove();
    addMsg('a','网络错误，请检查连接后重试。');
    loading=false;sbtn.disabled=false;sb();
  });
}

function addMsg(role,text){
  var div=document.createElement('div');
  div.className='m '+role;
  var safe=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  safe=safe.replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');
  if(safe.indexOf('<p>')<0)safe='<p>'+safe+'</p>';
  div.innerHTML='<div class="ma">'+(role==='a'?'AI':'我')+'</div><div class="mb">'+safe+'</div>';
  msgs.appendChild(div);sb();
}

function sb(){cw.scrollTop=cw.scrollHeight;}
})();
</script>
</body>
</html>
